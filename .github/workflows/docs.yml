name: Docs

# Builds the mdBook documentation site (book/) and deploys it to GitHub Pages on pushes to
# the website branch. PRs that touch the book get a build-only check (broken SUMMARY entries
# and malformed markdown fail the build), so docs rot is caught before merge.
#
# One-time repo setup for the deploy to work: Settings -> Pages -> Source: "GitHub Actions",
# and allow the website branch to deploy (Settings -> Environments -> github-pages ->
# deployment branches).

on:
  push:
    branches: [website]
    paths:
      - "book/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "book/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.4.52"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin
          mdbook --version

      - name: Build book
        run: mdbook build book

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
