name: Regtest E2E

# Live tier: brings up zebra (Regtest) + lightwalletd via zingo-infra and drives the real zecd
# binary over its JSON-RPC (see regtest-harness/). This needs a Linux host with network access
# (zingo-infra downloads zebrad/lightwalletd) and cannot run in the offline CI tier. The harness
# now resolves + compiles (vendored Cargo.lock + Rust 1.83); this run validates it end to end.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "regtest-harness/**"
      - "src/**"
      - ".github/workflows/regtest.yml"

concurrency:
  group: regtest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Release build: debug Orchard/Sapling proving is >20s; release keeps the harness snappy.
      - name: Build zecd (release)
        run: cargo build --release --bin zecd

      # Provision zebrad + lightwalletd from public images (zingo-infra's own binary host is
      # zingolabs-internal and unreachable). zingo-infra pins zebra rev 0dcc4205 = zebrad 2.1.1, so
      # we use zfnd/zebra:2.1.0 (closest published tag; 2.1.1 isn't published) - a version match so
      # its [mining] config fields and getblocktemplate output line up with zingo-infra's mining.
      # (zebra 5.0.0 fails: it removed the `debug_like_zcashd` mining config field zingo-infra
      # writes.) The harness reads ZEBRAD_BIN/LIGHTWALLETD_BIN and skips if either is missing.
      - name: Provision zebrad + lightwalletd from images
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          extract() {
            img="$1"; name="$2"; out="$RUNNER_TEMP/bin/$name"
            docker pull -q "$img"
            cid=$(docker create "$img")
            rel=$(docker export "$cid" | tar -tf - | grep -m1 -E "(^|/)${name}\$" || true)
            if [ -z "$rel" ]; then echo "::error::could not locate $name in $img"; docker rm "$cid" >/dev/null; exit 1; fi
            docker cp "$cid:/$rel" "$out"
            docker rm "$cid" >/dev/null
            chmod +x "$out"
            echo "$name -> $out"; file -b "$out" || true
          }
          extract zfnd/zebra:2.1.0 zebrad
          extract electriccoinco/lightwalletd:v0.4.19 lightwalletd
          echo "ZEBRAD_BIN=$RUNNER_TEMP/bin/zebrad" >> "$GITHUB_ENV"
          echo "LIGHTWALLETD_BIN=$RUNNER_TEMP/bin/lightwalletd" >> "$GITHUB_ENV"

      - name: Run regtest end-to-end harness
        env:
          ZECD_BIN: ${{ github.workspace }}/target/release/zecd
          # ZEBRAD_BIN / LIGHTWALLETD_BIN are exported by the provisioning step above.
        # Run from inside regtest-harness/ so its rust-toolchain.toml (Rust 1.83, matching the
        # vendored lock) drives the build; newer rustc rejects some pinned transitive crates.
        # --locked: don't wander off the vendored lock (yanked-but-locked orchard + pinned zebra).
        # Single-threaded: the harness binds fixed ports (zecd RPC + lightwalletd).
        run: cd regtest-harness && cargo test --locked -- --nocapture --test-threads=1
