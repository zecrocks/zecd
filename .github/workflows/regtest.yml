name: Regtest E2E

# Live tier: brings up the Zcash-Foundation regtest stack - zebra (Regtest) + lightwalletd - and
# drives the real zecd binary over its JSON-RPC (see regtest-harness/). It also builds
# zcash-devtool (regtest-enabled) as a funding wallet, used to shield a mined transparent coinbase
# into Orchard and fund zecd (the funded e2e). No zingo-infra: the harness mines via zebra's own
# getblocktemplate/submitblock. zebrad + lightwalletd are extracted from their official Docker
# images; everything builds on stable Rust against current zebra crates.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "regtest-harness/**"
      - "src/**"
      - ".github/workflows/regtest.yml"

concurrency:
  group: regtest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            regtest-harness
            zcash-devtool

      # Release build: debug Orchard/Sapling proving is >20s; release keeps the harness snappy.
      - name: Build zecd (release)
        run: cargo build --release --bin zecd

      # The funding wallet: zcash-devtool with regtest support (PR zecrocks/zcash-devtool#1).
      # It shields a mined transparent coinbase into Orchard and sends it to zecd, since regtest
      # can't mine an Orchard coinbase zecd would scan.
      # Pinned to a commit SHA (branch sleepy-faraday-T6HUy) so the build can't change
      # or vanish under us. TODO: switch `ref` to a main-branch SHA once zcash-devtool#1 merges.
      - name: Checkout zcash-devtool (funder)
        uses: actions/checkout@v4
        with:
          repository: zecrocks/zcash-devtool
          ref: 7ca3ce28ed9f606cdb1e1a6c8ae087cb2c5a2973
          path: zcash-devtool

      # Cache the funder binary keyed on its commit, so devtool is built once per devtool change
      # and skipped entirely on every other run (it rarely changes between zecd runs). On a miss,
      # rust-cache (above) still has its dependency tree, so the rebuild is just devtool's own crate.
      - name: Resolve devtool commit
        run: echo "DEVTOOL_SHA=$(git -C zcash-devtool rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Cache the funder binary
        id: devtool-bin
        uses: actions/cache@v4
        with:
          path: zcash-devtool/target/release/zcash-devtool
          key: devtool-bin-${{ runner.os }}-${{ env.DEVTOOL_SHA }}

      - name: Build zcash-devtool (funder)
        if: steps.devtool-bin.outputs.cache-hit != 'true'
        run: cargo build --release --manifest-path zcash-devtool/Cargo.toml --bin zcash-devtool

      # Extract zebrad + lightwalletd from their official Docker images. zebra MUST match the
      # zebra-rpc/zebra-chain tag the harness builds against (regtest-harness/Cargo.toml: v5.0.0)
      # so the block we assemble from getblocktemplate matches what this zebrad's submitblock
      # accepts. Keep these two in lockstep. The harness reads ZEBRAD_BIN/LIGHTWALLETD_BIN.
      - name: Provision zebrad + lightwalletd from images
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          extract() {
            img="$1"; name="$2"; out="$RUNNER_TEMP/bin/$name"
            docker pull -q "$img"
            cid=$(docker create "$img")
            rel=$(docker export "$cid" | tar -tf - | grep -m1 -E "(^|/)${name}\$" || true)
            if [ -z "$rel" ]; then echo "::error::could not locate $name in $img"; docker rm "$cid" >/dev/null; exit 1; fi
            docker cp "$cid:/$rel" "$out"
            docker rm "$cid" >/dev/null
            chmod +x "$out"
            echo "$name -> $out"; file -b "$out" || true
          }
          extract zfnd/zebra:5.0.0 zebrad
          extract electriccoinco/lightwalletd:v0.4.19 lightwalletd
          echo "ZEBRAD_BIN=$RUNNER_TEMP/bin/zebrad" >> "$GITHUB_ENV"
          echo "LIGHTWALLETD_BIN=$RUNNER_TEMP/bin/lightwalletd" >> "$GITHUB_ENV"

      - name: Run regtest end-to-end harness
        env:
          ZECD_BIN: ${{ github.workspace }}/target/release/zecd
          DEVTOOL_BIN: ${{ github.workspace }}/zcash-devtool/target/release/zcash-devtool
          # ZEBRAD_BIN / LIGHTWALLETD_BIN are exported by the provisioning step above.
        # --locked: build against the committed lock. Single-threaded: the harness binds fixed ports.
        run: cargo test --locked --manifest-path regtest-harness/Cargo.toml -- --nocapture --test-threads=1
