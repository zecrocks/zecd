name: Regtest E2E

# Live tier: brings up a zebra (Regtest) node and drives the real zecd binary over its JSON-RPC
# (zecd talks straight to zebrad - see regtest-harness/). It also builds zcash-devtool
# (regtest-enabled) as a funding wallet, used to shield a mined transparent coinbase into Orchard
# and fund zecd (the funded e2e). The funder speaks lightwalletd's gRPC, so the funded tests also
# run a lightwalletd in front of the same zebra - but the zecd under test always uses zebra.
# No zingo-infra: the harness mines via zebrad's
# Regtest-only `generate` RPC, so it has no zebra crate dependency and works against any zebrad
# release. zebrad + lightwalletd are extracted from their official Docker images.
#
# Runs on PRs and pushes to main against the pinned zebra image. The weekly schedule is the
# "big run": it tests BOTH the pinned image (re-validating the baseline) and zfnd/zebra:latest
# (an early-warning canary for upstream zebra changes), and - like manual dispatches - sets
# ZECD_REGTEST_EXTENDED=1 so the extended tests (reorg, multiwallet, stop/restore, watch-only) run too;
# on PR runs those skip in seconds (each spins its own zebra+lightwalletd stack).
#
# The note-scaling stress test (regtest_stress_notes) is heavier still - it builds thousands of
# notes and times multi-minute sends - so it is gated separately (ZECD_REGTEST_STRESS) and runs
# ONLY on a monthly cron (1st of the month) or a manual dispatch with the `stress` box ticked.
# It compiles on every run but skips in seconds otherwise.
#
# A separate `regtest-ironwood` job (schedule + manual dispatch, plus the
# ironwood-on-transparent-fixes branch) builds zecd `--features ironwood` - against the official
# zcash/librustzcash ironwood RC (no `nu6.3` cfg needed any more) - and runs the NU6.3 receive+send
# e2e against the ironwood toolchain images - see that job's header.

on:
  workflow_dispatch:
    inputs:
      zebra-image:
        description: "zfnd/zebra image tag to test against (e.g. 5.0.0, latest)"
        required: false
        default: ""
      stress:
        description: "Run the heavy note-scaling stress test (regtest_stress_notes)"
        type: boolean
        default: false
      stress-note-count:
        description: "Notes to build in the stress test (blank = default 256)"
        required: false
        default: ""
      zebra-ironwood-image:
        description: "Ironwood tier: NU6.3-capable zebrad image (default zfnd/zebra:6.0.0-rc.0); blank = the job default"
        required: false
        default: ""
      lwd-ironwood-image:
        description: "Ironwood tier: V6-aware lightwalletd image; blank = the job default"
        required: false
        default: ""
      devtool-ironwood-image:
        description: "Ironwood tier: regtest-aware zcash-devtool image; blank = the job default"
        required: false
        default: ""
  schedule:
    # Weekly canary against zfnd/zebra:latest (Mondays 06:17 UTC; an off-peak odd minute).
    - cron: "17 6 * * 1"
    # Monthly note-scaling stress run (1st of the month, 07:33 UTC). This cron - and only this
    # one - enables ZECD_REGTEST_STRESS; the weekly cron above leaves the stress test skipping.
    - cron: "33 7 1 * *"
  push:
    # Mainline only: feature branches (incl. feature/**) are covered by the pull_request trigger
    # below, so listing them here too would run every job twice on a PR push.
    branches: [main, master]
    paths:
      - "regtest-harness/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      # Only the Python harness scripts (conformance.py + the smoke scripts) feed the
      # regtest run; packaging/shell scripts under scripts/ don't, so scope to *.py.
      - "scripts/*.py"
      - ".github/workflows/regtest.yml"
  pull_request:
    paths:
      - "regtest-harness/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/*.py"
      - ".github/workflows/regtest.yml"

# The pinned zebra image used by PR/push runs; the schedule runs `latest` instead, and a manual
# dispatch can name any tag. Bumping zebra = changing this one value (the harness drives zebrad
# purely over JSON-RPC, so nothing else needs to move in lockstep).
#
# IMPORTANT: no workflow env var may start with `ZEBRA_` - zebrad parses ZEBRA_*-prefixed
# environment variables as config overrides and exits with "unknown field" on ones it doesn't
# recognise. (The harness also scrubs ZEBRA_* before spawning zebrad, as a second line of defence.)
env:
  ZEBRAD_IMAGE_PINNED: "6.0.0"

concurrency:
  group: regtest-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regtest:
    runs-on: ubuntu-latest
    # NB: new harness test files must be added to the leg here (it enumerates --test
    # targets; nothing runs them implicitly). Extended tests (gated on
    # ZECD_REGTEST_EXTENDED) are listed too: on PR runs they compile and skip in seconds.
    #
    # The `image` dimension is "event" except on the weekly schedule, where both the pinned
    # baseline and `latest` run ("event" resolves the tag from the trigger: dispatch input
    # or the pinned default).
    strategy:
      fail-fast: false
      matrix:
        suite: [zecd]
        image: ${{ github.event_name == 'schedule' && fromJSON('["pinned", "latest"]') || fromJSON('["event"]') }}
        include:
          - suite: zecd
            tests: --test regtest_e2e --test regtest_funded --test regtest_proving_cache --test regtest_sapling --test regtest_transparent --test regtest_transparent_t2t --test regtest_transparent_sendmany_t2t --test regtest_transparent_gap --test regtest_transparent_preexpose_responsive --test regtest_transparent_recovery_window --test regtest_hang --test regtest_reorg --test regtest_multiwallet --test regtest_restore --test regtest_watchonly
    name: regtest (${{ matrix.suite }}, ${{ matrix.image }})
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            regtest-harness
            zcash-devtool

      # Release build: debug Orchard/Sapling proving is >20s; release keeps the harness snappy.
      - name: Build zecd (release)
        run: cargo build --release --bin zecd

      # The funding wallet: zcash-devtool with regtest support (PR zecrocks/zcash-devtool#1).
      # It shields a mined transparent coinbase into Orchard and sends it to zecd, since regtest
      # can't mine an Orchard coinbase zecd would scan.
      # Pinned to a commit SHA (branch sleepy-faraday-T6HUy) so the build can't change
      # or vanish under us. TODO: switch `ref` to a main-branch SHA once zcash-devtool#1 merges.
      - name: Checkout zcash-devtool (funder)
        uses: actions/checkout@v4
        with:
          repository: zecrocks/zcash-devtool
          ref: 7ca3ce28ed9f606cdb1e1a6c8ae087cb2c5a2973
          path: zcash-devtool

      # Cache the funder binary keyed on its commit, so devtool is built once per devtool change
      # and skipped entirely on every other run (it rarely changes between zecd runs). On a miss,
      # rust-cache (above) still has its dependency tree, so the rebuild is just devtool's own crate.
      - name: Resolve devtool commit
        run: echo "DEVTOOL_SHA=$(git -C zcash-devtool rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Cache the funder binary
        id: devtool-bin
        uses: actions/cache@v4
        with:
          path: zcash-devtool/target/release/zcash-devtool
          key: devtool-bin-${{ runner.os }}-${{ env.DEVTOOL_SHA }}

      - name: Build zcash-devtool (funder)
        if: steps.devtool-bin.outputs.cache-hit != 'true'
        run: cargo build --release --manifest-path zcash-devtool/Cargo.toml --bin zcash-devtool

      # Pick the zebra image. The matrix names it outright on the weekly schedule
      # (pinned + latest legs); otherwise ("event") it comes from the trigger: a manual
      # dispatch's input, or the pinned tag for PR/push runs.
      - name: Select zebra image tag
        run: |
          case "${{ matrix.image }}" in
            pinned) tag="$ZEBRAD_IMAGE_PINNED" ;;
            latest) tag="latest" ;;
            *)
              case "${{ github.event_name }}" in
                workflow_dispatch) tag="${{ inputs.zebra-image }}"; tag="${tag:-$ZEBRAD_IMAGE_PINNED}" ;;
                *) tag="$ZEBRAD_IMAGE_PINNED" ;;
              esac
              ;;
          esac
          echo "Testing against zfnd/zebra:$tag"
          echo "ZEBRAD_IMAGE_TAG=$tag" >> "$GITHUB_ENV"

      # Extract zebrad + lightwalletd from their official Docker images. The harness drives
      # zebrad over JSON-RPC only (mining via the Regtest-only `generate` RPC), so any zebrad
      # release works. The harness reads ZEBRAD_BIN/LIGHTWALLETD_BIN.
      - name: Provision zebrad + lightwalletd from images
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          extract() {
            img="$1"; name="$2"; out="$RUNNER_TEMP/bin/$name"
            docker pull -q "$img"
            cid=$(docker create "$img")
            rel=$(docker export "$cid" | tar -tf - | grep -m1 -E "(^|/)${name}\$" || true)
            if [ -z "$rel" ]; then echo "::error::could not locate $name in $img"; docker rm "$cid" >/dev/null; exit 1; fi
            docker cp "$cid:/$rel" "$out"
            docker rm "$cid" >/dev/null
            chmod +x "$out"
            echo "$name -> $out"; file -b "$out" || true
          }
          extract "zfnd/zebra:$ZEBRAD_IMAGE_TAG" zebrad
          extract electriccoinco/lightwalletd:v0.4.19 lightwalletd
          echo "ZEBRAD_BIN=$RUNNER_TEMP/bin/zebrad" >> "$GITHUB_ENV"
          echo "LIGHTWALLETD_BIN=$RUNNER_TEMP/bin/lightwalletd" >> "$GITHUB_ENV"

      # The funded test also runs scripts/conformance.py (python3, stdlib-only) against the
      # live daemon, so the full Bitcoin-Core wire-format suite is exercised here in CI.
      - name: Run regtest end-to-end harness
        env:
          ZECD_BIN: ${{ github.workspace }}/target/release/zecd
          DEVTOOL_BIN: ${{ github.workspace }}/zcash-devtool/target/release/zcash-devtool
          # Capture zebrad's logs so a startup failure is diagnosable from the CI run.
          ZEBRAD_STDERR: ${{ runner.temp }}/zebrad.log
          # Stream zecd's own logs into the job output (the harness inherits its stdio; combined
          # with `--nocapture` below they appear in the run log). Focus debug on the transparent
          # receive paths (mempool attribution, the getaddresstxids enhancement) so the volume
          # stays manageable while a transparent-receive failure is diagnosable.
          ZECD_STDERR: "1"
          RUST_LOG: "zecd=info,zecd::wallet::actor=debug,zecd::chain=debug"
          # The extended tier (reorg, multiwallet, stop/restore, watch-only) runs on the weekly "big
          # run" and on manual dispatches; all PR/push runs (incl. the ironwood dev branch) let those
          # tests skip in seconds. The dev branch deliberately does NOT force extended: its reorg
          # test is timing/finalization-boundary sensitive and flakes, which would redden the PR for
          # reasons unrelated to the ironwood work and obscure that signal. (It still runs weekly.)
          ZECD_REGTEST_EXTENDED: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '' }}
          # The heavy note-scaling stress test runs ONLY on the monthly cron (the 1st-of-month
          # schedule) and on a manual dispatch that ticks `stress` - never on push/PR, and not on
          # the weekly cron. Its note target is `stress-note-count` on dispatch (blank -> default 256).
          ZECD_REGTEST_STRESS: ${{ (github.event.schedule == '33 7 1 * *' || (github.event_name == 'workflow_dispatch' && inputs.stress)) && '1' || '' }}
          ZECD_STRESS_NOTE_COUNT: ${{ inputs.stress-note-count }}
          # ZEBRAD_BIN / LIGHTWALLETD_BIN are exported by the provisioning step above.
        # --locked: build against the committed lock. Single-threaded: two zebrad+lightwalletd
        # stacks plus Orchard proving would contend badly on a 2-core runner.
        # --no-fail-fast: run every test binary even if an earlier one fails, so a single flaky
        # test can't mask the results of all the tests ordered after it.
        run: cargo test --locked --manifest-path regtest-harness/Cargo.toml ${{ matrix.tests }} --no-fail-fast -- --nocapture --test-threads=1

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "== disk =="
          df -h / "$RUNNER_TEMP" || true
          echo "== zebrad log (last 200 lines) =="
          tail -n 200 "$RUNNER_TEMP/zebrad.log" 2>/dev/null || echo "(no zebrad log was written)"

  # Ironwood (NU6.3) tier. Builds zecd with the `ironwood` feature (no cfg - the librustzcash pin,
  # zcash/librustzcash `dw/ironwood-scan-model`, exposes the ironwood wallet APIs unconditionally),
  # and runs the gated regtest_ironwood receive e2e against the NU6.3 toolchain: the OFFICIAL zebra
  # ironwood RC (`zfnd/zebra:6.0.0-rc.0`) plus a still-dev V6-aware lightwalletd and a regtest-aware
  # zcash-devtool funder. It funds zecd post-NU6.3 (auto-routed to an ironwood output) and asserts
  # zecd labels the received note `pool == "ironwood"`.
  #
  # zebra is now an official image, but lwd + devtool are still DEV images (emersonian/*) that may
  # move or vanish, so this job runs ONLY on the weekly schedule and on manual dispatch - never on
  # other branches' PRs, so a missing image can't redden PR CI. Bump the image refs in `env` below
  # (or pass them as dispatch inputs) as the ironwood stack is rebuilt; keep the NU6.3 height (8) in
  # lockstep with the harness' NU6_3_ACTIVATION_HEIGHT, zecd's network::regtest(), and devtool's
  # regtest_params().
  regtest-ironwood:
    # schedule + manual dispatch, plus the ironwood integration line so ironwood-work PRs auto-run
    # the NU6.3 e2e without a manual dispatch. `base_ref` matches any PR **into** `ironwood` (its
    # merge target); `ref` matches a direct push to `ironwood`. Never on unrelated branches' PRs -
    # the emersonian/* lwd/devtool images are dev artifacts and must not gate anyone else's CI. Drop
    # this keying (run it everywhere) once ironwood merges to the mainline and those images ship.
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.base_ref == 'ironwood' || github.ref == 'refs/heads/ironwood' }}
    runs-on: ubuntu-latest
    name: regtest (ironwood / NU6.3)
    env:
      # zebrad is now the OFFICIAL ironwood release candidate on Docker Hub (`zfnd/zebra:6.0.0-rc.0`),
      # which is NU6.3-capable and accepts the `"NU6.3"` regtest activation-height key - so the dev
      # `emersonian/zcash-zakura` image is retired. lwd + devtool stay pinned to dev images by
      # @sha256 digest (their tags are mutable), both rebuilt against the official zebra RC's V6 wire
      # format: lwd = `emersonian/zcash-lwd-ironwood:360a37d-zr8-nu63` (V6 parser for zebra 6.0.0-rc.0);
      # devtool = `emersonian/zcash-devtool:cac96846` (== ironwood-valar tip), built with
      # `regtest_support` so its regtest `init` takes `--activation-heights`; sends+receives ironwood.
      # A dispatch input can override any of them (e.g. with a `repo:tag`) when the stack is rebuilt;
      # bump these as the images are rebuilt.
      ZEBRAD_IRONWOOD_IMAGE: ${{ inputs.zebra-ironwood-image || 'zfnd/zebra:6.0.0-rc.0' }}
      LWD_IRONWOOD_IMAGE: ${{ inputs.lwd-ironwood-image || 'emersonian/zcash-lwd-ironwood@sha256:5f63b64ed788330ad8fe859fbbb334ceea844cf8a376318e7e25fbd3351b2f9f' }}
      DEVTOOL_IRONWOOD_IMAGE: ${{ inputs.devtool-ironwood-image || 'emersonian/zcash-devtool@sha256:fd95d8b432f47d3eec6e5f1eca0bdfbb8daa094c28742d230bec3ac47957bd6c' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            regtest-harness
          # Separate cache key: this build carries the ironwood feature + nu6.3 cfg.
          key: ironwood

      # zecd compiles the ironwood scan/balance/pool/send paths unconditionally now (no cargo
      # feature) - this is a plain release build. NU6.3 activation on the regtest chain is turned on
      # for the zecd process below via the `ZECD_REGTEST_NU63_HEIGHT` env var (see the e2e step).
      - name: Build zecd (release)
        run: cargo build --release --bin zecd

      # Extract zebrad + lightwalletd + the devtool funder from the ironwood toolchain images.
      - name: Provision ironwood zebrad + lightwalletd + devtool from images
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          extract() {
            img="$1"; name="$2"; out="$RUNNER_TEMP/bin/$name"
            docker pull -q "$img"
            cid=$(docker create "$img")
            rel=$(docker export "$cid" | tar -tf - | grep -m1 -E "(^|/)${name}\$" || true)
            if [ -z "$rel" ]; then echo "::error::could not locate $name in $img"; docker rm "$cid" >/dev/null; exit 1; fi
            docker cp "$cid:/$rel" "$out"
            docker rm "$cid" >/dev/null
            chmod +x "$out"
            echo "$name -> $out"; file -b "$out" || true
          }
          extract "$ZEBRAD_IRONWOOD_IMAGE" zebrad
          extract "$LWD_IRONWOOD_IMAGE" lightwalletd
          extract "$DEVTOOL_IRONWOOD_IMAGE" zcash-devtool
          echo "ZEBRAD_BIN=$RUNNER_TEMP/bin/zebrad" >> "$GITHUB_ENV"
          echo "LIGHTWALLETD_BIN=$RUNNER_TEMP/bin/lightwalletd" >> "$GITHUB_ENV"
          echo "DEVTOOL_BIN=$RUNNER_TEMP/bin/zcash-devtool" >> "$GITHUB_ENV"

      - name: Run ironwood (NU6.3) receive e2e
        env:
          ZECD_BIN: ${{ github.workspace }}/target/release/zecd
          ZECD_REGTEST_IRONWOOD: "1"
          # Activate NU6.3 at height 8 on the regtest chain for the zecd process (matches the zebra
          # the ironwood harness configures). Ironwood is always compiled; this env var is what turns
          # its activation on for regtest. The standard regtest tier leaves it unset (no NU6.3).
          ZECD_REGTEST_NU63_HEIGHT: "8"
          ZEBRAD_STDERR: ${{ runner.temp }}/zebrad.log
          # Stream zecd's own logs into the run output (info level) so a failure is diagnosable
          # without the debug flood that the receive/send bring-up needed.
          ZECD_STDERR: "1"
          RUST_LOG: "zecd=info"
          # ZEBRAD_BIN / LIGHTWALLETD_BIN / DEVTOOL_BIN are exported by the provisioning step.
        run: cargo test --locked --manifest-path regtest-harness/Cargo.toml --test regtest_ironwood --no-fail-fast -- --nocapture --test-threads=1

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "== disk =="
          df -h / "$RUNNER_TEMP" || true
          echo "== zebrad log (last 200 lines) =="
          tail -n 200 "$RUNNER_TEMP/zebrad.log" 2>/dev/null || echo "(no zebrad log was written)"
