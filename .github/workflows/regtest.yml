name: Regtest E2E

# Live tier: brings up the Zcash-Foundation regtest stack - zebra (Regtest) + lightwalletd - and
# drives the real zecd binary over its JSON-RPC (see regtest-harness/). It also builds
# zcash-devtool (regtest-enabled) as a funding wallet, used to shield a mined transparent coinbase
# into Orchard and fund zecd (the funded e2e). No zingo-infra: the harness mines via zebrad's
# Regtest-only `generate` RPC, so it has no zebra crate dependency and works against any zebrad
# release. zebrad + lightwalletd are extracted from their official Docker images.
#
# Runs on PRs and pushes to main against the pinned zebra image, and weekly (or on dispatch with
# an image tag of your choice) against zfnd/zebra:latest as an early-warning canary for upstream
# zebra changes.

on:
  workflow_dispatch:
    inputs:
      zebra-image:
        description: "zfnd/zebra image tag to test against (e.g. 5.0.0, latest)"
        required: false
        default: ""
  schedule:
    # Weekly canary against zfnd/zebra:latest (Mondays 06:17 UTC; an off-peak odd minute).
    - cron: "17 6 * * 1"
  push:
    branches: [main, master]
    paths:
      - "regtest-harness/**"
      - "src/**"
      - "scripts/**"
      - ".github/workflows/regtest.yml"
  pull_request:
    paths:
      - "regtest-harness/**"
      - "src/**"
      - "scripts/**"
      - ".github/workflows/regtest.yml"

# The pinned zebra image used by PR/push runs; the schedule runs `latest` instead, and a manual
# dispatch can name any tag. Bumping zebra = changing this one value (the harness drives zebrad
# purely over JSON-RPC, so nothing else needs to move in lockstep).
#
# IMPORTANT: no workflow env var may start with `ZEBRA_` - zebrad parses ZEBRA_*-prefixed
# environment variables as config overrides and exits with "unknown field" on ones it doesn't
# recognise. (The harness also scrubs ZEBRA_* before spawning zebrad, as a second line of defence.)
env:
  ZEBRAD_IMAGE_PINNED: "5.0.0"

concurrency:
  group: regtest-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regtest:
    runs-on: ubuntu-latest
    # One matrix leg per binary, so a tparty failure is attributable at a glance and the
    # suites run in parallel rather than serializing behind each other on one runner.
    # NB: new harness test files must be added to a leg here (the legs enumerate --test
    # targets; nothing runs them implicitly).
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: zecd
            tests: --test regtest_e2e --test regtest_funded --test regtest_failover --test regtest_hang
          - suite: tparty
            tests: --test regtest_tparty
    name: regtest (${{ matrix.suite }})
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            regtest-harness
            zcash-devtool

      # Release build: debug Orchard/Sapling proving is >20s; release keeps the harness snappy.
      # Builds both binaries: zecd (the funded e2e) and tparty (the auto-shield e2e).
      - name: Build zecd + tparty (release)
        run: cargo build --release --bins

      # The funding wallet: zcash-devtool with regtest support (PR zecrocks/zcash-devtool#1).
      # It shields a mined transparent coinbase into Orchard and sends it to zecd, since regtest
      # can't mine an Orchard coinbase zecd would scan.
      # Pinned to a commit SHA (branch sleepy-faraday-T6HUy) so the build can't change
      # or vanish under us. TODO: switch `ref` to a main-branch SHA once zcash-devtool#1 merges.
      - name: Checkout zcash-devtool (funder)
        uses: actions/checkout@v4
        with:
          repository: zecrocks/zcash-devtool
          ref: 7ca3ce28ed9f606cdb1e1a6c8ae087cb2c5a2973
          path: zcash-devtool

      # Cache the funder binary keyed on its commit, so devtool is built once per devtool change
      # and skipped entirely on every other run (it rarely changes between zecd runs). On a miss,
      # rust-cache (above) still has its dependency tree, so the rebuild is just devtool's own crate.
      - name: Resolve devtool commit
        run: echo "DEVTOOL_SHA=$(git -C zcash-devtool rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Cache the funder binary
        id: devtool-bin
        uses: actions/cache@v4
        with:
          path: zcash-devtool/target/release/zcash-devtool
          key: devtool-bin-${{ runner.os }}-${{ env.DEVTOOL_SHA }}

      - name: Build zcash-devtool (funder)
        if: steps.devtool-bin.outputs.cache-hit != 'true'
        run: cargo build --release --manifest-path zcash-devtool/Cargo.toml --bin zcash-devtool

      # Pick the zebra image: the pinned tag for PR/push runs, `latest` for the weekly canary,
      # or whatever a manual dispatch asked for.
      - name: Select zebra image tag
        run: |
          case "${{ github.event_name }}" in
            schedule) tag="latest" ;;
            workflow_dispatch) tag="${{ inputs.zebra-image }}"; tag="${tag:-$ZEBRAD_IMAGE_PINNED}" ;;
            *) tag="$ZEBRAD_IMAGE_PINNED" ;;
          esac
          echo "Testing against zfnd/zebra:$tag"
          echo "ZEBRAD_IMAGE_TAG=$tag" >> "$GITHUB_ENV"

      # Extract zebrad + lightwalletd from their official Docker images. The harness drives
      # zebrad over JSON-RPC only (mining via the Regtest-only `generate` RPC), so any zebrad
      # release works. The harness reads ZEBRAD_BIN/LIGHTWALLETD_BIN.
      - name: Provision zebrad + lightwalletd from images
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          extract() {
            img="$1"; name="$2"; out="$RUNNER_TEMP/bin/$name"
            docker pull -q "$img"
            cid=$(docker create "$img")
            rel=$(docker export "$cid" | tar -tf - | grep -m1 -E "(^|/)${name}\$" || true)
            if [ -z "$rel" ]; then echo "::error::could not locate $name in $img"; docker rm "$cid" >/dev/null; exit 1; fi
            docker cp "$cid:/$rel" "$out"
            docker rm "$cid" >/dev/null
            chmod +x "$out"
            echo "$name -> $out"; file -b "$out" || true
          }
          extract "zfnd/zebra:$ZEBRAD_IMAGE_TAG" zebrad
          extract electriccoinco/lightwalletd:v0.4.19 lightwalletd
          echo "ZEBRAD_BIN=$RUNNER_TEMP/bin/zebrad" >> "$GITHUB_ENV"
          echo "LIGHTWALLETD_BIN=$RUNNER_TEMP/bin/lightwalletd" >> "$GITHUB_ENV"

      # The funded test also runs scripts/conformance.py (python3, stdlib-only) against the
      # live daemon, so the full Bitcoin-Core wire-format suite is exercised here in CI.
      - name: Run regtest end-to-end harness
        env:
          ZECD_BIN: ${{ github.workspace }}/target/release/zecd
          TPARTY_BIN: ${{ github.workspace }}/target/release/tparty
          DEVTOOL_BIN: ${{ github.workspace }}/zcash-devtool/target/release/zcash-devtool
          # Capture zebrad's logs so a startup failure is diagnosable from the CI run.
          ZEBRAD_STDERR: ${{ runner.temp }}/zebrad.log
          # ZEBRAD_BIN / LIGHTWALLETD_BIN are exported by the provisioning step above.
        # --locked: build against the committed lock. Single-threaded: two zebrad+lightwalletd
        # stacks plus Orchard proving would contend badly on a 2-core runner.
        run: cargo test --locked --manifest-path regtest-harness/Cargo.toml ${{ matrix.tests }} -- --nocapture --test-threads=1

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "== disk =="
          df -h / "$RUNNER_TEMP" || true
          echo "== zebrad log (last 200 lines) =="
          tail -n 200 "$RUNNER_TEMP/zebrad.log" 2>/dev/null || echo "(no zebrad log was written)"
