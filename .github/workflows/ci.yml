name: CI

# Offline tier: builds zecd and runs the full `cargo test` suite (unit + HTTP integration +
# the regtest network/lifecycle tests) plus clippy. No network or Docker required, so this is
# the gating check that runs on every push/PR - including from automated runs.

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --bin zecd

      - name: Test (offline - includes the regtest network + wallet-lifecycle tests)
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # Dependency vulnerability scan against the RustSec advisory DB. Warnings (unmaintained
  # crates) don't fail the job; vulnerabilities do.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # RUSTSEC-2026-0009 (`time` 0.3.37, DoS via stack exhaustion when parsing untrusted
      # time strings - zecd never parses external time input): the fix (time >=0.3.47)
      # requires time-core 0.1.8, but zcash_client_backend 0.23.0 pins time-core =0.1.2.
      # Drop the ignore once librustzcash ships a release that unpins it.
      - name: Audit dependencies
        run: cargo audit --ignore RUSTSEC-2026-0009
