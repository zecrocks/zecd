name: CI

# Offline tier: builds zecd and runs the full `cargo test` suite (unit + HTTP integration +
# the regtest network/lifecycle tests) plus clippy. No network or Docker required, so this is
# the gating check that runs on every push/PR - including from automated runs.

on:
  push:
    # Mainline only: feature branches (incl. feature/**) are covered by the pull_request trigger
    # below, so listing them here too would run every job twice on a PR push.
    branches: [main, master]
    # Skip the Rust build/test/clippy/deny/msrv tier for changes that can't affect it:
    # docs, deploy samples, the release/docker/regtest workflows, the Dockerfiles, and the
    # release packaging script. (Editing ci.yml itself still runs - it's not ignored.)
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "deploy/**"
      - "LICENSE-*"
      - "zecd.example.toml"
      - "Dockerfile*"
      - ".dockerignore"
      - "scripts/build-deb.sh"
      - ".github/workflows/release.yml"
      - ".github/workflows/docker.yml"
      - ".github/workflows/regtest.yml"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "deploy/**"
      - "LICENSE-*"
      - "zecd.example.toml"
      - "Dockerfile*"
      - ".dockerignore"
      - "scripts/build-deb.sh"
      - ".github/workflows/release.yml"
      - ".github/workflows/docker.yml"
      - ".github/workflows/regtest.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Formatting (both workspaces)
        run: |
          cargo fmt --all --check
          cargo fmt --all --check --manifest-path regtest-harness/Cargo.toml

      - name: Build (both binaries)
        run: cargo build --bins

      - name: Test (offline - includes the regtest network + wallet-lifecycle tests)
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # Dependency policy: RustSec advisories (vulnerabilities AND unmaintained crates),
  # license allowlist, wildcard-version ban, and registry/git source pinning. Exceptions
  # (with rationale) live in deny.toml; .cargo/audit.toml mirrors the advisory exceptions
  # for local `cargo audit` runs.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check advisories, licenses, bans, sources
        run: cargo deny check

  # Verify the crate still builds at the declared minimum supported Rust version
  # (Cargo.toml `rust-version`). The floor is set by the librustzcash wallet stack:
  # tonic 0.14.6 and home 0.5.12 both require 1.88.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2

      - name: Check at MSRV
        run: cargo check --all-targets
