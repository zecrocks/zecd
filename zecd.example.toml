# Example zecd configuration. Copy to <datadir>/zecd.toml (or pass --conf) and edit.
# CLI flags (e.g. --rpcuser, --rpcport, --testnet, --datadir, --server) override these.

# Network: "main" or "test".
network = "test"

# Parent directory for per-wallet subdirectories, the cookie file, and (by default) the
# age identity. Each wallet lives in its own subdirectory.
datadir = "./data"

# Wallet selected when a request hits "/" rather than "/wallet/<name>".
default_wallet = "default"

# One section per wallet. The directory holds data.sqlite, keys.toml, blocks/, labels.sqlite.
[wallets.default]
dir = "./data/default"

[lightwalletd]
# The chain upstream. The default is "zebra": a LOCAL zebrad's JSON-RPC, no lightwalletd
# needed - shorthand for "zebra://127.0.0.1:8234" on mainnet / "zebra://127.0.0.1:18234" on
# testnet (zebrad ships with RPC disabled, so set its `rpc.listen_addr` to that port; the
# zcashd-convention ports 8232/18232 belong to zecd's own RPC). See [zebra] below for
# credentials. Alternatives: "zebra://host:port" (a zebrad on another port) | a "host:port"
# lightwalletd (your own, e.g. "127.0.0.1:9067") | the public lightwalletd presets
# "zecrocks" | "ecc" | "ywallet" (fine for getting started; for production, run your own node).
server = "zebra"
# Or list multiple endpoints for failover, tried in order and always preferring the first (the
# daemon snaps back to the primary when it recovers). `servers` takes precedence over `server`.
# A scheme prefix sets the endpoint kind / TLS (zebra:// = local zebrad; http:// = plaintext
# lightwalletd; https:// = TLS lightwalletd); without a prefix TLS is auto (on for remote
# hosts, off for localhost).
#   testnet:  servers = ["zebra://127.0.0.1:18234", "https://testnet.zec.rocks:443"]
#   mainnet:  servers = ["zebra://127.0.0.1:8234", "https://zec.rocks:443", "https://eu.zec.rocks:443"]
# How to reach lightwalletd:
#   "direct" - connect directly (TLS for remote hosts, plaintext for localhost).
#   "tor" - route all traffic through Tor's default SOCKS port (127.0.0.1:9050);
#                            run a tor daemon alongside zecd. Use ".onion" endpoints for full
#                            privacy (they skip TLS - Tor encrypts the hop).
#   "socks5://host:port" - route through any SOCKS5 proxy (Tor on a custom port, Nym, etc.).
# The proxy applies to every configured endpoint; TLS is still layered on top for remote hosts so
# the proxy only ever sees ciphertext.
connection = "direct"
# Per-attempt dial timeout (seconds) so a hung/black-holed endpoint can't stall sync.
connect_timeout_secs = 10
# Reconnect backoff (seconds): start at base, double up to max, with full jitter.
reconnect_base_secs = 1
reconnect_max_secs = 60
# While running on a fallback, how often (seconds) to re-probe higher-priority servers.
primary_recheck_secs = 60

# Credentials for the "zebra" / "zebra://host:port" endpoints above. Omit the whole section
# when zebrad runs with `enable_cookie_auth = false`. A cookie file wins over user/password
# and is re-read on every reconnect (zebrad regenerates it at startup).
# [zebra]
# rpc_cookie = "/var/lib/zebrad/.cookie"
# rpc_user = "user"
# rpc_password = "pass"

[rpc]
bind = "127.0.0.1"
# Mainnet default 8232, testnet default 18232.
port = 18232
# If user/password are omitted, a bitcoind-style cookie file is generated at <datadir>/.cookie.
user = "zec"
password = "change-me"
# Additional bitcoind-style rpcauth credentials (salted - no plaintext in the config).
# Generate entries with bitcoin's share/rpcauth/rpcauth.py: `rpcauth.py <user> [password]`.
# auth = ["alice:<salt>$<hmac-sha256 hex>"]
# cookiefile = "./data/.cookie"

[keys]
# age identity file used to decrypt the wallet seed for unattended sending.
age_identity = "./data/identity.txt"
# Decrypt the seed at startup so sendtoaddress/sendmany work without walletpassphrase.
auto_unlock = true

# Cloud-KMS keystore ("envelope encryption" / auto-unseal): the wallet's at-rest encryption
# key is wrapped by a key held in AWS KMS or Google Cloud KMS, and the daemon unlocks it at
# startup with one IAM-gated KMS Decrypt - no identity file, no passphrase, and every unlock
# is a CloudTrail / Cloud Audit Logs entry. Create such a wallet with `zecd init --keystore`,
# or migrate an existing one with `zecd rewrap`.
# [keystore]
# provider = "aws-kms"                # or "gcp-kms"
# AWS: a key ARN (preferred - its region wins), key id, or alias. GCP: the full resource
# name projects/<p>/locations/<l>/keyRings/<r>/cryptoKeys/<k>.
# key = "arn:aws:kms:us-east-1:111122223333:key/<uuid>"
# API endpoint override - for KMS emulators in tests (moto/local-kms) or VPC/private
# endpoints. Omit for the provider default.
# endpoint = "http://localhost:8080"

[sync]
# How often to poll lightwalletd for new blocks (seconds).
interval_secs = 20
# How often (at most) to re-broadcast wallet txs that are unmined and unexpired (seconds).
# Covers sends whose initial broadcast failed and mempool drops across upstream restarts.
rebroadcast_secs = 60

[spend]
# The wallet-wide confirmations policy (ZIP 315 defaults, like Zallet): how deep an output
# must be before it is spendable. Anchors getbalance/getbalances/getwalletinfo and spend
# proposals; getbalance's explicit minconf argument overrides it per call. Lowering these
# trades reorg/double-spend safety for latency.
# Confirmations before the wallet's *own* outputs (change) are spendable.
trusted_confirmations = 3
# Confirmations before third-party payments are spendable (must be >= trusted_confirmations).
untrusted_confirmations = 10
# What sends may reveal on-chain (zcashd/Zallet's privacy-policy opt-in, reduced to the one
# distinction that matters for an Orchard-only wallet):
#   "AllowRevealedRecipients" (default) - recipients without an Orchard receiver (transparent
#       and Sapling-only addresses) are allowed; such sends reveal the amount (and a
#       transparent recipient) on-chain.
#   "FullPrivacy" - every recipient must have an Orchard receiver; sends that would reveal
#       anything are rejected with -8.
privacy_policy = "AllowRevealedRecipients"
