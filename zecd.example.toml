# Example zecd configuration. Copy to <datadir>/zecd.toml (or pass --conf) and edit.
# CLI flags (e.g. --rpcuser, --rpcport, --testnet, --datadir, --server) override these.
#
# For 12-factor / Kubernetes deployments, several secret inputs can come from the environment
# or a mounted Secret file instead of this (ConfigMap-bound) TOML:
#   ZECD_AGE_IDENTITY - path to the age identity (also --age-identity / [keys] age_identity)
#   ZECD_KEYS_FILE - path to the default wallet's keys.toml (also --keys-file / keys_file)
#   ZECD_RPC_PASSWORD - the RPC password (also --rpcpassword / [rpc] password_file)
#   ZECD_DATADIR - the data directory (also --datadir / datadir)
# And for non-interactive `zecd init --restore`:
#   ZECD_MNEMONIC - the seed phrase (also --mnemonic-file); else read from stdin
#   ZECD_WALLET_PASSPHRASE - the at-rest passphrase for `init --encrypt`; else prompted

# Network: "main" or "test".
network = "test"

# Parent directory for per-wallet subdirectories, the cookie file, and (by default) the
# age identity. Each wallet lives in its own subdirectory.
datadir = "./data"

# Wallet selected when a request hits "/" rather than "/wallet/<name>".
default_wallet = "default"

# One section per wallet. The directory holds data.sqlite, keys.toml, blocks/, labels.sqlite.
[wallets.default]
dir = "./data/default"
# Optional: put this wallet's keys.toml somewhere other than <dir>/keys.toml - e.g. a
# Kubernetes Secret mounted read-only, separate from the (disposable, cache-only) data dir.
# The global [keys] keys_file below sets this for the default wallet; ZECD_KEYS_FILE /
# --keys-file override it. data.sqlite, blocks/ and labels.sqlite still live under `dir`.
# keys_file = "/secrets/keys.toml"

[backend]
# The chain upstream is a LOCAL zebrad's JSON-RPC. The default is "zebra": shorthand for
# "zebra://127.0.0.1:8234" on mainnet / "zebra://127.0.0.1:18234" on testnet (zebrad ships
# with RPC disabled, so set its `rpc.listen_addr` to that port; the zcashd-convention ports
# 8232/18232 belong to zecd's own RPC). See [zebra] below for credentials. Use
# "zebra://host:port" for a zebrad on another host/port.
server = "zebra"
# Per-attempt dial timeout (seconds) so a hung/black-holed endpoint can't stall sync.
connect_timeout_secs = 10
# Reconnect backoff (seconds): start at base, double up to max, with full jitter.
reconnect_base_secs = 1
reconnect_max_secs = 60

# Credentials for the "zebra" / "zebra://host:port" endpoints above. Omit the whole section
# when zebrad runs with `enable_cookie_auth = false`. A cookie file wins over user/password
# and is re-read on every reconnect (zebrad regenerates it at startup).
# [zebra]
# rpc_cookie = "/var/lib/zebrad/.cookie"
# rpc_user = "user"
# rpc_password = "pass"

[rpc]
bind = "127.0.0.1"
# Mainnet default 8232, testnet default 18232.
port = 18232
# If user/password are omitted, a bitcoind-style cookie file is generated at <datadir>/.cookie.
user = "zec"
password = "change-me"
# The RPC password is spend-equivalent for clients, so in a ConfigMap+Secret split keep it
# OUT of this (ConfigMap-bound) file. Source it from a mounted Secret file or the environment
# instead; precedence is --rpcpassword / ZECD_RPC_PASSWORD > password_file > inline `password`.
# password_file = "/secrets/rpc.password"
# Additional bitcoind-style rpcauth credentials (salted - no plaintext in the config).
# Generate entries with the built-in tool: `zecd rpcauth <user> [password]`
# (omit the password to have a strong random one generated and printed once).
# auth = ["alice:<salt>$<hmac-sha256 hex>"]
#
# Cookie auth: with no user/password pair set, zecd mints a random secret at startup and
# writes __cookie__:<random> to this file (mode 0600). Any local process that can read the
# file authenticates with it - no shared secret to configure, regenerated each startup
# (how bitcoin-cli auths to a local node by default).
# cookiefile = "./data/.cookie"
#
# RPC method safelist. By default (this key absent or empty) every method below is served.
# Uncomment `allowed_methods` and keep ONLY the methods you want reachable: any method not on
# a non-empty list is rejected with -32601 ("Method not found"), exactly as if it did not
# exist - so a locked-down server discloses nothing about what it has disabled. Names are
# validated at startup, so a typo fails fast instead of silently disabling a method.
#
# This is a coarse, server-wide gate, NOT per-user - remember RPC credentials are already spend
# authority (see the README's SECURITY notes). Its value is shrinking the surface: a pure
# invoicing integration only needs an address + a few read methods, so disabling the rest means
# a leaked credential (or a buggy client) can't reach sendtoaddress, encryptwallet, stop, etc.
#
# Every implemented method is listed below; methods left commented stay disabled. Lines marked
# ⚠ are administrative or move funds - think twice before exposing them.
# allowed_methods = [
#   # --- Typical invoicing / payment-monitoring surface (receive + read) ---
#   "getnewaddress",           # hand out a fresh receive address
#   "getbalance",
#   "getbalances",
#   "getunconfirmedbalance",
#   "getwalletinfo",
#   "listtransactions",
#   "listsinceblock",
#   "gettransaction",
#   "listunspent",
#   "getreceivedbyaddress",
#   "listreceivedbyaddress",
#   "getreceivedbylabel",
#   "listreceivedbylabel",
#   "getaddressinfo",
#   "getaddressesbylabel",
#   "listlabels",
#   "setlabel",
#   "listwallets",
#   "validateaddress",
#
#   # --- Spending (omit entirely on a receive-only deployment) ---
#   "sendtoaddress",           # ⚠ moves funds
#   "sendmany",                # ⚠ moves funds
#   "sendrawtransaction",      # ⚠ broadcasts caller-built transactions
#
#   # --- Chain / network / fee (read-only) ---
#   "getrawtransaction",
#   "getblockchaininfo",
#   "getblockcount",
#   "getbestblockhash",
#   "getblockhash",
#   "getblockheader",
#   "getnetworkinfo",
#   "getconnectioncount",
#   "getpeerinfo",
#   "ping",
#   "getmempoolinfo",
#   "estimatesmartfee",
#   "estimatefee",
#   "settxfee",                # inert stub (always returns -8)
#
#   # --- Control ---
#   "uptime",
#   "help",
#   "getrpcinfo",
#   "stop",                    # ⚠ shuts the daemon down (SIGTERM / Ctrl-C also work)
#
#   # --- At-rest encryption / lock state (administrative) ---
#   "walletpassphrase",        # unlock an encrypted wallet for the session
#   "walletlock",              # re-lock
#   "walletpassphrasechange",  # ⚠ rotate the passphrase
#   "encryptwallet",           # ⚠ re-wraps the seed at rest; can lock the owner out
# ]

[keys]
# age identity file used to decrypt the wallet seed for unattended sending.
age_identity = "./data/identity.txt"
# Decrypt the seed at startup so sendtoaddress/sendmany work without walletpassphrase.
auto_unlock = true
# Optional: location of the DEFAULT wallet's keys.toml (the age-encrypted seed), independent
# of the datadir, so it can be mounted as a Secret while the datadir stays a disposable cache.
# Equivalent to [wallets.default] keys_file; ZECD_KEYS_FILE / --keys-file override it.
# keys_file = "/secrets/keys.toml"
# Rebuild data.sqlite from keys.toml when the data directory is empty (default true): the
# account is recreated from the seed - immediately for an identity/auto_unlock wallet, at the
# first walletpassphrase for an encrypted one - then the wallet rescans from its birthday. This
# is what lets the data directory be a disposable cache (mount keys.toml as a Secret, start with
# an empty PVC). Set false to instead fail fast on an empty datadir. (Watch-only wallets have no
# seed and aren't covered - recreate them with `zecd init --ufvk`.)
bootstrap_from_keys = true

[pools]
# Shielded value pools this wallet uses. zecd is shielded-only; supported pools are "sapling"
# and "orchard" (a future "ironwood" pool will slot in here). These are the GLOBAL defaults;
# any [wallets.<name>] section can override `pools`/`default_receivers` independently.
#
# `enabled` - pools the wallet receives into and spends from. Change is sent to the
#                       strongest enabled pool (Orchard if enabled).
# `default_receivers` - receivers included in the Unified Addresses getnewaddress hands out
#                       when no per-call override is given. Must be a SUBSET of `enabled`
#                       (naming a disabled pool is a startup error). Defaults to `enabled`.
#
# The default (this section omitted) is Orchard-only, preserving zecd's historical behaviour.
# To enable Sapling receiving as well:
#   enabled = ["sapling", "orchard"]
#   default_receivers = ["sapling", "orchard"]
# getnewaddress accepts a per-call override in its address_type argument, e.g.
#   getnewaddress "" "sapling"          (Sapling receiver only)
#   getnewaddress "" "sapling,orchard"  (both)
# constrained to the enabled pools (else -8).
enabled = ["orchard"]
default_receivers = ["orchard"]

[sync]
# How often to poll zebra for new blocks (seconds).
interval_secs = 20
# How often (at most) to re-broadcast wallet txs that are unmined and unexpired (seconds).
# Covers sends whose initial broadcast failed and mempool drops across upstream restarts.
rebroadcast_secs = 60

[spend]
# The wallet-wide confirmations policy (ZIP 315 defaults, like Zallet): how deep an output
# must be before it is spendable. Anchors getbalance/getbalances/getwalletinfo and spend
# proposals; getbalance's explicit minconf argument overrides it per call. Lowering these
# trades reorg/double-spend safety for latency.
# Confirmations before the wallet's *own* outputs (change) are spendable.
trusted_confirmations = 3
# Confirmations before third-party payments are spendable (must be >= trusted_confirmations).
untrusted_confirmations = 10
# What sends may reveal on-chain (zcashd/Zallet's privacy-policy opt-in, zcash/zcash#6240):
#   "AllowRevealedRecipients" (default) - allow transparent recipients and Sapling<->Orchard
#       cross-pool sends; such sends reveal the transferred amount on-chain (and the recipient,
#       if transparent).
#   "FullPrivacy" - only fully-shielded sends confined to a single shielded pool: no transparent
#       recipients, and no Sapling<->Orchard crossing. Anything that would reveal an amount or a
#       recipient is rejected with -8.
privacy_policy = "AllowRevealedRecipients"
# Cap on the number of Orchard actions (max of Orchard inputs vs. Orchard outputs) a single
# send may build, mirroring Zallet's [builder.limits] orchard_actions. It bounds the memory and
# proving cost of one z_sendmany and gives a clear -8 ("too many Orchard actions") instead of a
# deep builder error when a send has too many recipients. Raise it for large batched payouts;
# set it to 0 to disable the cap entirely.
orchard_action_limit = 50
