# Minimal Zebra config for serving lightwalletd. Testnet default; the mainnet variant is
# zebrad.mainnet.toml (used via docker-compose.mainnet.yml).
[network]
network = "Testnet"

[rpc]
# Expose JSON-RPC on the compose network for lightwalletd. Keep this off any public interface.
listen_addr = "0.0.0.0:18232"

[state]
cache_dir = "/var/cache/zebra"
