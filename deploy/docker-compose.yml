# Example self-hosted Zcash stack:  zebra (full node) -> zecd.
#
# zecd talks straight to zebra's JSON-RPC (zebra:// mode, the default backend). The optional
# `lightwalletd` profile adds a lightwalletd in front of the same zebra - enable it when this
# stack should also serve other light clients (mobile wallets) over gRPC, and add
# "http://lightwalletd:9067" to the failover list in zecd.toml.
#
# Testnet by default. For mainnet, add `-f docker-compose.mainnet.yml` to each command below (it
# swaps in the *.mainnet.* config files). The image tags are EXAMPLES - pin them to releases you
# have verified; the zebra/lightwalletd flags can vary between versions.
#
# First run (zebra must sync enough before zecd can init):
#   docker compose up -d zebra                     # let it sync
#   docker compose run --rm zecd init --wallet default --account-name primary
#   docker compose up -d                           # start zecd (and the rest)
# With the lightwalletd profile: docker compose --profile lightwalletd up -d
#
# Probes:   curl localhost:9233/healthz ; curl localhost:9233/readyz
# RPC:      curl --user zec:CHANGE-ME --data-binary '{"method":"getblockchaininfo","id":1}' localhost:18232/

services:
  zebra:
    image: zfnd/zebra:5.0.0                 # pin to a verified release (zebra tags have no 'v' prefix)
    restart: unless-stopped
    command: ["zebrad", "-c", "/etc/zebra/zebrad.toml", "start"]
    volumes:
      - ./zebrad.toml:/etc/zebra/zebrad.toml:ro
      - zebra-state:/var/cache/zebra
    expose:
      - "18234"   # JSON-RPC, reached by zecd (and lightwalletd, if enabled) over the compose network

  lightwalletd:
    image: electriccoinco/lightwalletd:v0.4.19   # pin to a verified release
    profiles: ["lightwalletd"]                   # optional: serve other light clients over gRPC
    restart: unless-stopped
    depends_on:
      - zebra
    command:
      - "--grpc-bind-addr=0.0.0.0:9067"
      - "--no-tls-very-insecure"               # plaintext gRPC on the internal network
      - "--log-file=/dev/stdout"
      - "--zcash-conf-path=/etc/lightwalletd/zcash.conf"
      - "--data-dir=/var/lib/lightwalletd"
    volumes:
      - ./lightwalletd-zcash.conf:/etc/lightwalletd/zcash.conf:ro
      - lwd-data:/var/lib/lightwalletd
    expose:
      - "9067"

  zecd:
    build:
      context: ..
      dockerfile: Dockerfile   # StageX build is amd64-only; on ARM hosts use Dockerfile.arm64
    restart: unless-stopped
    depends_on:
      - zebra
    command: ["--datadir=/var/lib/zecd", "--conf=/etc/zecd/zecd.toml"]
    environment:
      - RUST_LOG=info
    volumes:
      - ./zecd.toml:/etc/zecd/zecd.toml:ro
      - zecd-data:/var/lib/zecd
    # Published on loopback only: RPC credentials are spend authority and travel as plaintext
    # HTTP Basic auth, so the port must not be reachable from untrusted networks. To serve other
    # hosts, front it with TLS/a reverse proxy - or, understanding the exposure, change the
    # mapping to "18232:18232".
    ports:
      - "127.0.0.1:18232:18232"   # Bitcoin-style JSON-RPC
      - "127.0.0.1:9233:9233"     # health: /healthz /readyz /status

volumes:
  zebra-state:
  lwd-data:
  zecd-data:
