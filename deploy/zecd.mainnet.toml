# zecd configuration for the docker-compose stack - MAINNET variant.
# Use with: docker compose -f docker-compose.yml -f docker-compose.mainnet.yml up -d
# The default stack is testnet (zecd.toml); this file switches zecd to mainnet.

network = "main"
datadir = "/var/lib/zecd"
default_wallet = "default"

[wallets.default]
dir = "/var/lib/zecd/default"

[backend]
# Failover, tried in order, always preferring the first: the co-located zebra full node
# (zebra:// = its JSON-RPC, no lightwalletd in between), then the public zecrocks mainnet
# endpoints if the local node is down. With the optional lightwalletd profile enabled, slot
# "http://lightwalletd:9067" in as the second entry.
servers = ["zebra://zebra:18234", "https://zec.rocks:443", "https://eu.zec.rocks:443"]
connect_timeout_secs = 10
reconnect_base_secs = 1
reconnect_max_secs = 60
primary_recheck_secs = 60

[rpc]
# Kept on 18232 (matching the testnet stack's published port) rather than the mainnet default 8232,
# so the compose port mapping is identical across networks. Protect with auth + a network policy.
bind = "0.0.0.0"
port = 18232
user = "zec"
password = "CHANGE-ME"

[keys]
age_identity = "/var/lib/zecd/identity.txt"
auto_unlock = true

[sync]
interval_secs = 20

[health]
bind = "0.0.0.0"
port = 9233

[log]
level = "info"
format = "json"
