# zecd configuration for the docker-compose stack (mounted at /etc/zecd/zecd.toml).
# Matches the stack's network - testnet by default; see docker-compose.yml / zebrad.toml.

network = "test"
datadir = "/var/lib/zecd"
default_wallet = "default"

[wallets.default]
dir = "/var/lib/zecd/default"

[backend]
# The co-located zebra full node's JSON-RPC (zebra:// = direct to zebrad, no lightwalletd).
server = "zebra://zebra:18234"
# For a MAINNET deployment, set network = "main" above and the mainnet RPC port:
# server = "zebra://zebra:8234"
connect_timeout_secs = 10
reconnect_base_secs = 1
reconnect_max_secs = 60

[rpc]
# Bind to all interfaces so the published container port is reachable; protect with auth and a
# network policy / reverse proxy. Do not expose this port to untrusted networks.
bind = "0.0.0.0"
port = 18232
user = "zec"
password = "CHANGE-ME"

[keys]
# age identity written by `zecd init`; used to decrypt the seed for unattended sending.
age_identity = "/var/lib/zecd/identity.txt"
auto_unlock = true

[sync]
interval_secs = 20

[health]
# Bind probes to all interfaces so the compose-published port (9233) is reachable.
bind = "0.0.0.0"
port = 9233
# What /readyz gates on:
#   "connected" (default) - ready as soon as the backend is connected and its chain tip is past
#       this wallet's birthday height (a sanity check that we're on the right, live network). Does
#       NOT wait for the wallet to finish scanning, so RPC clients can reach zecd while it catches
#       up, and readiness doesn't flap during a long sync. Reads may lag the tip until caught up.
#   "synced" - ready only once the wallet is connected AND within `max_scan_lag` blocks of the
#       chain tip. Strict: a from-birthday restore stays not-ready until it catches up. The height
#       gap is the meaningful "caught up" signal - librustzcash's note-weighted progress ratio
#       reaches 1.0 while historical ranges are still being scanned, so it would report ready long
#       before the wallet has scanned to its own funds.
# readiness = "connected"
# max_scan_lag only applies in "synced" mode.
# max_scan_lag = 4

[log]
level = "info"
format = "json"
