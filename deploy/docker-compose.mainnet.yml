# Mainnet override for the self-hosted stack. The base docker-compose.yml is testnet by default;
# this override swaps each service's config file for its mainnet variant and pins zebra back to a
# stable release. Ports and wiring are unchanged, so the same workflow applies - just add
# `-f docker-compose.mainnet.yml`:
#
#   docker compose -f docker-compose.yml -f docker-compose.mainnet.yml up -d zebra
#   docker compose -f docker-compose.yml -f docker-compose.mainnet.yml run --rm zecd init --wallet default
#   docker compose -f docker-compose.yml -f docker-compose.mainnet.yml up -d
#
# Compose v2 merges service `volumes` by container path, so each mount below replaces its testnet
# counterpart from the base file while leaving the named data volumes intact.

services:
  zebra:
    # Ironwood (NU6.3) is testnet-only, so mainnet stays on the stable zebra release instead of the
    # ironwood release candidate the testnet stack pins.
    image: zfnd/zebra:5.0.0
    volumes:
      - ./zebrad.mainnet.toml:/etc/zebra/zebrad.toml:ro

  zecd:
    volumes:
      - ./zecd.mainnet.toml:/etc/zecd/zecd.toml:ro
