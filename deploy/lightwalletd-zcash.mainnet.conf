# lightwalletd's node RPC connection details - MAINNET variant (no `testnet=1`).
# Used by docker-compose.mainnet.yml; the default stack uses lightwalletd-zcash.conf.
# Zebra's RPC does not require auth; the user/password are placeholders lightwalletd expects.
rpcbind=zebra
rpcport=18232
rpcuser=zecd
rpcpassword=zecd-localnet
