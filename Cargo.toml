[package]
name = "zecd"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
publish = false
description = "A Bitcoin-Core-style JSON-RPC server for Orchard-only Zcash, built on librustzcash"

# Two binaries share the `zecd` library: `zecd` (the Orchard-only wallet server) and
# `tparty` (transparent deposit addresses that auto-shield into the same seed's pool).
[[bin]]
name = "zecd"
path = "src/main.rs"

[[bin]]
name = "tparty"
path = "src/bin/tparty.rs"

[dependencies]
# Async runtime + HTTP server (hyper's client side drives the zebra JSON-RPC backend)
tokio = { version = "1.21", features = ["rt-multi-thread", "macros", "fs", "signal", "sync", "time", "io-util"] }
axum = { version = "0.7", features = ["json"] }
tower = { version = "0.5", features = ["util"] }
hyper = { version = "1", features = ["client", "http1"] }
http-body-util = "0.1"
bytes = "1"
futures-util = "0.3"

# Serialization. `arbitrary_precision` is REQUIRED: bitcoind emits amounts as JSON numbers
# with 8 decimals and clients parse them as Decimal; without this they round-trip through f64.
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["arbitrary_precision"] }

# CLI / config / logging
clap = { version = "4.5", features = ["derive", "string", "env"] }
toml = "0.8"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }

# Auth. hmac+sha2 implement Bitcoin Core's salted `rpcauth` scheme (HMAC-SHA256).
base64 = "0.22"
subtle = "2"
hmac = "0.12"
sha2 = "0.10"
# hash160 (= ripemd160(sha256)) for transparent-script address extraction in
# `getrawtransaction`; already in the tree via the zcash crates.
ripemd = "0.1"
rand = { version = "0.8", default-features = false, features = ["std", "std_rng"] }
hex = "0.4"

# Seed handling
age = { version = "0.11", features = ["armor"] }
bip0039 = { version = "0.12", features = ["std", "all-languages"] }
secrecy = "0.8"

# lightwalletd transport. `tls-ring` installs the rustls crypto provider; `tls-native-roots`
# lets us trust the OS store (and SSL_CERT_FILE), which `tls-webpki-roots` alone does not.
tonic = { version = "0.14", features = ["gzip", "tls-ring", "tls-native-roots", "tls-webpki-roots"] }
prost = "0.14"
# SOCKS5 proxy support for routing lightwalletd connections through Tor/Nym/any SOCKS5 proxy.
# `hyper-util`'s `TokioIo` adapts the proxied TCP stream to tonic's connector interface; its
# legacy client is the HTTP/1.1 client behind the zebra JSON-RPC backend.
tokio-socks = "0.5"
hyper-util = { version = "0.1", features = ["tokio", "client-legacy", "http1"] }
rusqlite = { version = "0.37", features = ["time"] }
time = "0.3"
uuid = { version = "1", features = ["v4", "serde"] }
rayon = "1.7"

# Zcash - versions identical to zcash-devtool/Cargo.toml
orchard = { version = "0.14", default-features = false }
zcash_address = "0.12"
# `transparent-inputs` is required by `tparty` (transparent deposit detection + shielding);
# it is additive for `zecd`, whose wallets never expose transparent receivers.
zcash_client_backend = { version = "0.23", features = ["lightwalletd-tonic-tls-webpki-roots", "orchard", "transparent-inputs"] }
zcash_client_sqlite = { version = "0.21", features = ["unstable", "orchard", "serde", "transparent-inputs"] }
zcash_keys = { version = "0.14", features = ["unstable", "orchard"] }
zcash_primitives = "0.28"
zcash_proofs = { version = "0.28", features = ["bundled-prover"] }
zcash_protocol = { version = "0.9", features = ["local-consensus"] }
zcash_transparent = "0.8"
# Script asm rendering + standard-script solver for `getrawtransaction` (already in the
# tree via zcash_transparent; same crate Zallet uses for this).
zcash_script = "0.4.5"
sapling = { package = "sapling-crypto", version = "0.7" }
zip32 = "0.2"
zip321 = "0.8"
# Cloud-KMS keystore providers (the `keystore` feature; on by default, excludable with
# --no-default-features for a leaner dependency tree). aws-sdk-kms's default `rustls`
# feature would pull the *legacy* rustls 0.21 TLS stack (RUSTSEC-flagged webpki 0.101);
# default-https-client is the maintained rustls 0.23 client aws-config's defaults also use.
aws-config = { version = "1.8.13", optional = true }
aws-sdk-kms = { version = "1.99.0", default-features = false, features = ["default-https-client", "rt-tokio"], optional = true }
gcp_auth = { version = "0.12.6", optional = true }
hyper-rustls = { version = "0.27", features = ["http1", "native-tokio"], optional = true }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"], optional = true }
libc = "0.2.186"

[features]
default = ["keystore"]
# Cloud-KMS key custody ([keystore] config, `init --keystore`, `rewrap`): wrap the wallet's
# at-rest encryption key with AWS KMS / Google Cloud KMS. Without it, KMS-related config and
# keys.toml markers still parse, but any wrap/unwrap reports that support isn't compiled in.
keystore = ["dep:aws-config", "dep:aws-sdk-kms", "dep:gcp_auth", "dep:hyper-rustls", "dep:rustls"]

[dev-dependencies]
tempfile = "3"
# Frontier bookkeeping for the fabricated-chain reorg test (matches librustzcash's version).
incrementalmerkletree = "0.8"

# The ONLY patched dependency (librustzcash etc. stay on released crates.io versions -
# see the project docs): a vendored i18n-embed-fl 0.9.4 with the deterministic-argument-order
# fix from kellpossible/cargo-i18n#151 backported, so `age`'s fl! macro expansions (and
# therefore the reproducible Docker builds) stop being a per-build coin flip. Remove
# when an `age` release depends on i18n-embed-fl 0.10+.
[patch.crates-io]
i18n-embed-fl = { path = "vendor/i18n-embed-fl" }
